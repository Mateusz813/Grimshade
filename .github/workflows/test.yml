name: Test

# Pipeline odpala się na każdy PR + push do develop/master.
# Zgodnie z CLAUDE.md "TESTING — pokrycie obowiązkowe" — żaden merge
# bez zielonych testów.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

# Anuluj poprzedni run gdy ten sam PR dostaje nowy push (oszczędność
# CI minut + szybszy feedback).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
        continue-on-error: true  # lint warningi nie blokują (na razie)

  unit:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright (E2E)
    runs-on: ubuntu-latest
    needs: static
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # E2E hits a REAL Supabase + needs test-account creds. Without those
      # secrets the suite can't run, so we SKIP gracefully (job stays green)
      # rather than fail red. Add the secrets (see .github/DEPLOY.md "E2E in CI")
      # to activate. NOTE: enabling this runs E2E against whatever Supabase
      # VITE_SUPABASE_URL points at on every push — point it at a dedicated
      # TEST project, not production, to avoid prod DB load + churn.
      - name: Check e2e secrets present
        id: e2eguard
        run: echo "ready=${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.E2E_USER_EMAIL != '' }}" >> "$GITHUB_OUTPUT"
      # Cache browsers — pierwszy run zainstaluje, kolejne biorą z cache.
      - name: Cache Playwright browsers
        if: steps.e2eguard.outputs.ready == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
      # Install BOTH browsers the config uses: chromium (mobile-chrome /
      # Pixel 7) + webkit (mobile-safari / iPhone 13).
      - name: Install Playwright browsers
        if: steps.e2eguard.outputs.ready == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit
      - name: Install only Playwright system deps (when cache hit)
        if: steps.e2eguard.outputs.ready == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit
      - name: Run E2E
        if: steps.e2eguard.outputs.ready == 'true'
        run: npm run test:e2e
        env:
          CI: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_USER2_EMAIL: ${{ secrets.E2E_USER2_EMAIL }}
          E2E_USER2_PASSWORD: ${{ secrets.E2E_USER2_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - name: E2E skipped (secrets missing)
        if: steps.e2eguard.outputs.ready != 'true'
        run: echo "::notice::E2E secrets not set — skipping Playwright in CI. Add them (see .github/DEPLOY.md) to activate; point VITE_SUPABASE_URL at a TEST Supabase project, not prod."
      - name: Upload Playwright report
        if: always() && steps.e2eguard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload Playwright traces (on failure)
        if: failure() && steps.e2eguard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ── Production deploy — GATED on tests ──────────────────────────────────────
  # `needs: [unit, e2e]` (and those need `static`) means this job ONLY runs when
  # Typecheck + Vitest (unit+integration) + Playwright (E2E) all pass. If any
  # test fails, the deploy is skipped → broken code never reaches production.
  #
  # Runs only on a real push to `master` (production branch), never on PRs/develop.
  #
  # SETUP REQUIRED (one-time) before this actually deploys — see
  # `.github/DEPLOY.md`:
  #   1. Add 3 GitHub repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
  #   2. Disable Vercel's own git auto-deploy for `master` (so only this gated
  #      path deploys) — set `git.deploymentEnabled.master: false` in vercel.json
  #      OR toggle it off in the Vercel dashboard.
  # Until VERCEL_TOKEN is set the deploy steps SKIP gracefully (job stays green) —
  # so adding this job does not break CI before you finish the setup.
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Check deploy secrets present
        id: guard
        run: echo "ready=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build (production)
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy prebuilt to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy skipped (secrets missing)
        if: steps.guard.outputs.ready != 'true'
        run: echo "::notice::VERCEL_TOKEN not set — skipping gated deploy. Add secrets (see .github/DEPLOY.md) to activate."
