name: Test

# Pipeline odpala się na każdy PR + push do develop/master.
# Zgodnie z CLAUDE.md "TESTING — pokrycie obowiązkowe" — żaden merge
# bez zielonych testów.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

# Anuluj poprzedni run gdy ten sam PR dostaje nowy push (oszczędność
# CI minut + szybszy feedback).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint -- --quiet

  unit:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright (E2E)
    runs-on: ubuntu-latest
    needs: static
    # E2E runs ONLY for master — a push to master OR a PR targeting master.
    # develop pushes/PRs run Typecheck + Vitest only (fast feedback); the full
    # ~40-min Playwright suite is reserved for production (master).
    if: github.ref == 'refs/heads/master' || github.base_ref == 'master'
    # Full suite (193 specs × 2 profile) runs sequentially (workers: 1) against
    # one shared Supabase.
    #
    # UWAGA — ten sufit NIE jest bezpiecznikiem i nigdy nim nie był:
    # gdy wystrzeli, job jest CANCELLED i NIE MA raportu ani traces (dokładnie
    # to stało się 2026-07-16: krok E2E leciał 1h59m i został ucięty w ciemno).
    # Realnym bezpiecznikiem jest `globalTimeout: 90 min` w playwright.config.ts —
    # niższy od tego sufitu, więc Playwright kończy się SAM i zdąży wypluć artefakty.
    # Ten timeout to już tylko ostatnia deska ratunku na zawieszony proces.
    #
    # Wcześniejszy komentarz twierdził, że "maxFailures aborts a broken run far
    # sooner" — to NIEPRAWDA: Playwright liczy do maxFailures tylko FINALNE
    # porażki (test uratowany przez retry = `flaky`, nie `failed`), więc przy
    # maxFailures:12 + retries:2 bezpiecznik potrzebował ~50-100 min zanim wystrzelił.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # E2E hits a REAL Supabase + needs test-account creds. Without those
      # secrets the suite can't run, so we SKIP gracefully (job stays green)
      # rather than fail red. Add the secrets (see .github/DEPLOY.md "E2E in CI")
      # to activate. NOTE: enabling this runs E2E against whatever Supabase
      # VITE_SUPABASE_URL points at on every push — point it at a dedicated
      # TEST project, not production, to avoid prod DB load + churn.
      - name: Check e2e secrets present
        id: e2eguard
        run: echo "ready=${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.E2E_USER_EMAIL != '' }}" >> "$GITHUB_OUTPUT"
      # Cache browsers — pierwszy run zainstaluje, kolejne biorą z cache.
      - name: Cache Playwright browsers
        if: steps.e2eguard.outputs.ready == 'true'
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
      # CI odpala TYLKO projekt mobile-chrome (playwright.config.ts: `projects:
      # isCI ? [pixel7] : [iphone13, pixel7]`) — 193 zamiast 386 wykonań, ~połowa
      # wall-clocku. Dlatego instalujemy sam chromium; webkit byłby pobierany
      # i nigdy nie uruchomiony. Lokalnie oba profile działają bez zmian.
      # TRADE-OFF: WebKit/iPhone nie ma pokrycia w CI — a to realna platforma dla
      # mobilnej PWA. Docelowo: pełna matryca w nightly (patrz TODO niżej).
      - name: Install Playwright browsers
        if: steps.e2eguard.outputs.ready == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install only Playwright system deps (when cache hit)
        if: steps.e2eguard.outputs.ready == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E
        if: steps.e2eguard.outputs.ready == 'true'
        run: npm run test:e2e
        env:
          CI: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_USER2_EMAIL: ${{ secrets.E2E_USER2_EMAIL }}
          E2E_USER2_PASSWORD: ${{ secrets.E2E_USER2_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - name: E2E skipped (secrets missing)
        if: steps.e2eguard.outputs.ready != 'true'
        run: echo "E2E secrets not set — skipping Playwright in CI. Add them (see .github/DEPLOY.md) to activate; point VITE_SUPABASE_URL at a TEST Supabase project, not prod."
      - name: Upload Playwright report
        if: always() && steps.e2eguard.outputs.ready == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload Playwright traces (on failure)
        if: failure() && steps.e2eguard.outputs.ready == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # -- Production deploy — GATED on typecheck + unit/integration --------------
  # 2026-06-23: deploy now `needs: [unit]` (which needs `static` = Typecheck +
  # Lint). It gates on the FAST, deterministic checks — typecheck + the 5093
  # Vitest unit/integration tests (deep coverage of all game logic). The full
  # Playwright E2E suite is NO LONGER a deploy gate: 428 specs run sequentially
  # against one shared Supabase (free-tier) with a fresh login per test, which
  # reliably rate-limits GoTrue ("listUsers failed") and/or blows the time cap —
  # i.e. it could never pass as a prod gate and silently blocked every deploy.
  # E2E still RUNS on master pushes as a non-blocking signal (see the `e2e` job);
  # it just doesn't hold back production. TODO: re-add a lightweight @smoke E2E
  # gate once a smoke subset is tagged (avoids the full-suite rate-limit).
  #
  # Runs only on a real push to `master` (production branch), never on PRs/develop.
  #
  # SETUP REQUIRED (one-time) before this actually deploys — see
  # `.github/DEPLOY.md`:
  #   1. Add 3 GitHub repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
  #   2. Disable Vercel's own git auto-deploy for `master` (so only this gated
  #      path deploys) — set `git.deploymentEnabled.master: false` in vercel.json
  #      OR toggle it off in the Vercel dashboard.
  # Until VERCEL_TOKEN is set the deploy steps SKIP gracefully (job stays green) —
  # so adding this job does not break CI before you finish the setup.
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: [unit]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Check deploy secrets present
        id: guard
        run: echo "ready=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        if: steps.guard.outputs.ready == 'true'
      - uses: actions/setup-node@v5
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build (production)
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy prebuilt to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy skipped (secrets missing)
        if: steps.guard.outputs.ready != 'true'
        run: echo "VERCEL_TOKEN not set — gated deploy nieaktywny; produkcja idzie przez Vercel auto-deploy. Add secrets (see .github/DEPLOY.md) to activate."
