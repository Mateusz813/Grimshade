<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 2026-05-20: favicon + iOS home-screen icon now use the dedicated
         brand artwork at /pwa.png (copied from src/assets/images/pwa.png).
         Multiple sizes so browsers pick the closest match: 192/512 for
         modern Chrome/Firefox tabs, apple-touch-icon for iOS Safari
         pinned-to-home, /pwa.png itself as the high-res fallback. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <link rel="icon" type="image/png" href="/pwa.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <!-- MedievalSharp from Google Fonts — loaded once at the document
         level so every component inherits the family without per-view
         @import duplication. `preconnect` warms up the font CDN before
         the stylesheet lands so the family is available on first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap"
      rel="stylesheet"
    />
    <title>Grimshade</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
